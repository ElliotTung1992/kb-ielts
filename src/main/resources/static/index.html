<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IELTS 学习系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center mb-4">
    <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none me-3"><i class="bi bi-list"></i></button>
    <h4 class="mb-0 fw-bold"><i class="bi bi-house-door me-2"></i>首页</h4>
  </div>

  <!-- 今日计划 -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:52px;height:52px;background:#e8f0fe">
            <i class="bi bi-calendar-check text-primary fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">今日计划</div>
            <div class="fs-3 fw-bold" id="todayTotal">-</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:52px;height:52px;background:#e6f9ed">
            <i class="bi bi-check-circle text-success fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">已完成</div>
            <div class="fs-3 fw-bold" id="todayDone">-</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:52px;height:52px;background:#fff3e0">
            <i class="bi bi-hourglass-split text-warning fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">待复习</div>
            <div class="fs-3 fw-bold" id="todayDue">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 统计概览 -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold text-primary" id="statTotal">-</div>
        <div class="text-muted small">总记录</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold" style="color:#0d6efd" id="statLearning">-</div>
        <div class="text-muted small">学习中</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold" style="color:#6f42c1" id="statReviewing">-</div>
        <div class="text-muted small">复习中</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold text-success" id="statMastered">-</div>
        <div class="text-muted small">已掌握</div>
      </div>
    </div>
  </div>

  <!-- 快捷入口 -->
  <h6 class="text-muted mb-3">快捷入口</h6>
  <div class="row g-3">
    <div class="col-6 col-md-3">
      <a href="study.html" class="card border-0 shadow-sm text-decoration-none h-100">
        <div class="card-body text-center py-4">
          <i class="bi bi-play-circle-fill text-primary fs-1"></i>
          <div class="mt-2 fw-semibold text-dark">开始学习</div>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-3">
      <a href="words.html" class="card border-0 shadow-sm text-decoration-none h-100">
        <div class="card-body text-center py-4">
          <i class="bi bi-alphabet text-info fs-1"></i>
          <div class="mt-2 fw-semibold text-dark">单词库</div>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-3">
      <a href="stats.html" class="card border-0 shadow-sm text-decoration-none h-100">
        <div class="card-body text-center py-4">
          <i class="bi bi-bar-chart-fill text-warning fs-1"></i>
          <div class="mt-2 fw-semibold text-dark">学习统计</div>
        </div>
      </a>
    </div>
    <div class="col-6 col-md-3">
      <a href="grammar-points.html" class="card border-0 shadow-sm text-decoration-none h-100">
        <div class="card-body text-center py-4">
          <i class="bi bi-book-fill text-success fs-1"></i>
          <div class="mt-2 fw-semibold text-dark">语法要点</div>
        </div>
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();

async function loadDashboard() {
    try {
        const dashboard = await Api.dashboard();
        const plan = dashboard.todayPlan;
        const stats = dashboard.stats;
        document.getElementById('todayTotal').textContent = plan.totalItems;
        document.getElementById('todayDone').textContent = plan.completedItems;
        document.getElementById('todayDue').textContent = stats.dueToday ?? 0;
        document.getElementById('statTotal').textContent = stats.totalRecords;
        document.getElementById('statLearning').textContent = stats.learningCount;
        document.getElementById('statReviewing').textContent = stats.reviewingCount;
        document.getElementById('statMastered').textContent = stats.masteredCount;
    } catch (e) {
        console.error(e);
    }
}
loadDashboard();
</script>
</body>
</html>
