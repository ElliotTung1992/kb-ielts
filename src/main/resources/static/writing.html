<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>写作任务 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none"><i class="bi bi-list"></i></button>
      <h4 class="mb-0 fw-bold"><i class="bi bi-pencil me-2"></i>写作任务</h4>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="openImport()"><i class="bi bi-upload me-1"></i>批量导入</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus-lg me-1"></i>添加任务</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-2"><label class="form-label small text-muted mb-1">难度</label><select class="form-select form-select-sm" id="filterDiff"><option value="">全部难度</option><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
        <div class="col-md-2"><label class="form-label small text-muted mb-1">Task</label><select class="form-select form-select-sm" id="filterTask"><option value="">全部 Task</option><option value="1">Task 1</option><option value="2">Task 2</option></select></div>
        <div class="col-md-2"><label class="form-label small text-muted mb-1">考试类型</label><select class="form-select form-select-sm" id="filterTrainingType"><option value="">全部类型</option><option value="ACADEMIC">Academic</option><option value="GENERAL">General</option></select></div>
        <div class="col-md-2"><label class="form-label small text-muted mb-1">状态</label><select class="form-select form-select-sm" id="filterStatus"><option value="">全部状态</option><option value="NEW">待学习</option><option value="LEARNING">学习中</option><option value="REVIEWING">复习中</option><option value="MASTERED">已掌握</option></select></div>
        <div class="col-md-3"><label class="form-label small text-muted mb-1">话题标签</label><input class="form-control form-control-sm" id="filterTopic" placeholder="society,education,environment"></div>
        <div class="col-md-1"><button class="btn btn-primary btn-sm w-100" onclick="loadPage(1)"><i class="bi bi-search"></i></button></div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light"><tr><th style="width:28%">标题</th><th style="width:10%">Task</th><th style="width:12%">类型</th><th style="width:16%">题型</th><th style="width:12%">状态</th><th style="width:10%">难度</th><th style="width:142px">操作</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
      <span class="text-muted small" id="totalInfo"></span>
      <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">添加写作任务</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-md-5"><label class="form-label">标题 *</label><input class="form-control" id="taskTitle" maxlength="200" required></div>
        <div class="col-md-2"><label class="form-label">Task</label><select class="form-select" id="taskNumber"><option value="1">Task 1</option><option value="2">Task 2</option></select></div>
        <div class="col-md-2"><label class="form-label">考试类型</label><select class="form-select" id="taskTrainingType"><option value="ACADEMIC">Academic</option><option value="GENERAL">General</option></select></div>
        <div class="col-md-2"><label class="form-label">题型</label><input class="form-control" id="taskType" placeholder="bar-chart / argument"></div>
        <div class="col-md-1"><label class="form-label">难度</label><select class="form-select" id="taskDifficulty"><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
        <div class="col-12"><label class="form-label">题目要求 *</label><textarea class="form-control" id="taskPrompt" rows="4" required></textarea></div>
        <div class="col-12"><label class="form-label">图表数据描述（Task 1）</label><textarea class="form-control" id="taskImageDescription" rows="2"></textarea></div>
        <div class="col-md-6"><label class="form-label">范文</label><textarea class="form-control" id="taskModelAnswer" rows="6"></textarea></div>
        <div class="col-md-6"><label class="form-label">高分评分要点</label><textarea class="form-control" id="taskBandNote" rows="6"></textarea></div>
        <div class="col-12"><label class="form-label">话题标签</label><input class="form-control" id="taskTags" placeholder="society,education,environment"></div>
      </div>
      <div id="modalLinksContainer" class="mt-4"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" id="saveBtn" onclick="save()"><i class="bi bi-check2 me-1"></i>保存</button></div>
  </div></div>
</div>

<div class="modal fade" id="importModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">批量导入 JSON</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><textarea class="form-control font-monospace" id="importJson" rows="12" placeholder='[{"title":"Population Growth","taskNumber":2,"trainingType":"ACADEMIC","taskType":"argument","difficulty":2}]'></textarea></div>
    <div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="doImport()">导入</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/nav.js"></script>
<script src="js/links.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
const TYPE = 'writing-tasks';
let currentPage = 1;
let editId = null;
let taskCache = new Map();
const editModal = new bootstrap.Modal(document.getElementById('editModal'));
const importModal = new bootstrap.Modal(document.getElementById('importModal'));

async function loadPage(page = 1) {
    currentPage = page;
    const data = await Api.list(TYPE, {
        difficulty: document.getElementById('filterDiff').value,
        taskNumber: document.getElementById('filterTask').value,
        trainingType: document.getElementById('filterTrainingType').value,
        studyStatus: document.getElementById('filterStatus').value,
        topicTags: document.getElementById('filterTopic').value,
        page,
        size: 20
    });
    taskCache = new Map(data.content.map(task => [task.id, task]));
    document.getElementById('totalInfo').textContent = `共 ${data.totalElements} 条`;
    document.getElementById('tbody').innerHTML = data.content.length ? data.content.map(renderRow).join('') : renderEmpty();
    document.getElementById('pagination').innerHTML = renderPagination(data);
}

function renderRow(task) {
    return `
    <tr>
      <td><div class="fw-semibold">${escHtml(task.title)}</div><div class="mt-1">${renderTags(task.topicTags)}</div></td>
      <td><span class="badge bg-dark">Task ${task.taskNumber}</span></td>
      <td><span class="badge ${task.trainingType === 'ACADEMIC' ? 'bg-primary' : 'bg-success'}">${task.trainingType || '-'}</span></td>
      <td><span class="badge bg-light text-dark border">${escHtml(task.taskType || '-')}</span></td>
      <td>${studyStatusBadge(task.studyStatus)}</td>
      <td>${diffBadge(task.difficulty)}</td>
      <td><div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-primary" title="编辑" onclick="editById('${task.id}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-success" title="加入学习" onclick="startStudy('WRITING','${task.id}')"><i class="bi bi-play"></i></button>
        <button class="btn btn-sm btn-outline-danger" title="删除" onclick="remove('${task.id}')"><i class="bi bi-trash"></i></button>
      </div></td>
    </tr>`;
}

function renderEmpty() {
    return `<tr><td colspan="7" class="text-center text-muted py-5">暂无写作任务</td></tr>`;
}

function renderPagination(data) {
    if (!data.totalPages || data.totalPages <= 1) return '';
    return Array.from({length: data.totalPages}, (_, i) => {
        const page = i + 1;
        const active = page === data.page + 1 ? ' active' : '';
        return `<li class="page-item${active}"><a class="page-link" href="#" onclick="loadPage(${page});return false">${page}</a></li>`;
    }).join('');
}

function openAdd() {
    editId = null;
    document.getElementById('modalTitle').textContent = '添加写作任务';
    setFormValues({ taskNumber: 2, trainingType: 'ACADEMIC', difficulty: 2 });
    LinksPanel.initInline(TYPE, null, 'modalLinksContainer');
    editModal.show();
}

function openImport() {
    importModal.show();
}

function editById(id) {
    const task = taskCache.get(id);
    if (!task) return;
    editId = id;
    document.getElementById('modalTitle').textContent = '编辑写作任务';
    setFormValues(task);
    LinksPanel.initInline(TYPE, editId, 'modalLinksContainer');
    editModal.show();
}

function setFormValues(task) {
    document.getElementById('taskTitle').value = task.title || '';
    document.getElementById('taskNumber').value = task.taskNumber || 2;
    document.getElementById('taskTrainingType').value = task.trainingType || 'ACADEMIC';
    document.getElementById('taskType').value = task.taskType || '';
    document.getElementById('taskPrompt').value = task.prompt || '';
    document.getElementById('taskImageDescription').value = task.imageDescription || '';
    document.getElementById('taskModelAnswer').value = task.modelAnswer || '';
    document.getElementById('taskBandNote').value = task.bandScoreNote || '';
    document.getElementById('taskDifficulty').value = task.difficulty || 1;
    document.getElementById('taskTags').value = task.topicTags || '';
}

async function save() {
    const body = readForm();
    if (!body.title || !body.prompt) {
        showToast('请填写标题和题目要求', 'warning');
        return;
    }
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    try {
        if (editId) {
            await Api.update(TYPE, editId, body);
            editModal.hide();
            showToast('更新成功');
            await loadPage(currentPage);
        } else {
            const created = await Api.create(TYPE, body);
            editId = created.id;
            document.getElementById('modalTitle').textContent = '编辑写作任务';
            showToast('添加成功，可继续添加关联');
            await loadPage(1);
            LinksPanel.initInline(TYPE, editId, 'modalLinksContainer');
        }
    } catch (e) {
        showToast(e.message, 'danger');
    } finally {
        saveBtn.disabled = false;
    }
}

function readForm() {
    return {
        title: document.getElementById('taskTitle').value.trim(),
        taskNumber: parseInt(document.getElementById('taskNumber').value, 10),
        trainingType: document.getElementById('taskTrainingType').value,
        taskType: document.getElementById('taskType').value.trim() || null,
        prompt: document.getElementById('taskPrompt').value.trim(),
        imageDescription: document.getElementById('taskImageDescription').value.trim() || null,
        modelAnswer: document.getElementById('taskModelAnswer').value.trim() || null,
        bandScoreNote: document.getElementById('taskBandNote').value.trim() || null,
        difficulty: parseInt(document.getElementById('taskDifficulty').value, 10),
        topicTags: document.getElementById('taskTags').value.trim() || null
    };
}

async function remove(id) {
    if (!confirm('确认删除？')) return;
    try {
        await Api.remove(TYPE, id);
        showToast('删除成功');
        await loadPage(currentPage);
    } catch (e) {
        showToast(e.message, 'danger');
    }
}

async function startStudy(type, id) {
    try {
        await Api.study.start(type, id);
        showToast('已加入学习计划');
        await loadPage(currentPage);
    } catch (e) {
        showToast(e.message, 'danger');
    }
}

async function doImport() {
    try {
        const arr = JSON.parse(document.getElementById('importJson').value.trim());
        const res = await Api.batchImport(TYPE, arr);
        importModal.hide();
        showToast(`成功导入 ${res.imported} 条`);
        await loadPage(1);
    } catch (e) {
        showToast('导入失败: ' + e.message, 'danger');
    }
}

function renderTags(tags) {
    if (!tags) return '';
    return String(tags).split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="badge bg-light text-dark border me-1">${escHtml(t)}</span>`).join('');
}

function studyStatusBadge(status) {
    if (!status) return '<span class="badge bg-light text-dark border">待学习</span>';
    return statusBadge(status);
}

attachTopicTagDatalist(['taskTags', 'filterTopic']);
loadPage(1).catch(e => showToast(e.message || '加载失败', 'danger'));
</script>
</body>
</html>
