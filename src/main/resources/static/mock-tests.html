<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>模考记录 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div><div id="main">
<div class="d-flex align-items-center justify-content-between mb-4"><div><button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none me-3"><i class="bi bi-list"></i></button><span class="h4 fw-bold"><i class="bi bi-clipboard-data me-2"></i>模考记录</span></div><button class="btn btn-primary" onclick="createMock()">快速新增</button></div>
<div class="card border-0 shadow-sm"><table class="table mb-0"><thead class="table-light"><tr><th class="ps-3">日期</th><th>来源</th><th>总分</th><th>下阶段重点</th></tr></thead><tbody id="tbody"></tbody></table></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script src="js/api.js"></script><script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
async function load(){ const rows = await Api.mockTests.list(); document.getElementById('tbody').innerHTML = rows.map(r=>`<tr><td class="ps-3">${r.testDate}</td><td>${escHtml(r.source||'-')}</td><td>${r.overallScore??'-'}</td><td>${escHtml(r.nextFocus||'-')}</td></tr>`).join(''); }
async function createMock(){ const today = new Date().toISOString().slice(0,10); await Api.mockTests.create({testDate:today, source:'手动记录', overallScore:null, nextFocus:'READING', sections:[]}); showToast('已新增'); load(); }
load().catch(e=>showToast(e.message,'danger'));
</script></body></html>
