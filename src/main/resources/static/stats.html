<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>学习统计 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center mb-4">
    <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none me-3"><i class="bi bi-list"></i></button>
    <h4 class="mb-0 fw-bold"><i class="bi bi-bar-chart-line me-2"></i>学习统计</h4>
  </div>

  <!-- 顶部摘要卡片 -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-2">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold text-dark" id="sTotal">-</div>
        <div class="text-muted small">总计</div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card border-0 shadow-sm text-center py-3 stat-card" style="cursor:pointer" onclick="showRecords('LEARNING','学习中')">
        <div class="fs-2 fw-bold text-primary" id="sLearning">-</div>
        <div class="text-muted small">学习中 <i class="bi bi-chevron-right small"></i></div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card border-0 shadow-sm text-center py-3 stat-card" style="cursor:pointer" onclick="showRecords('REVIEWING','复习中')">
        <div class="fs-2 fw-bold" style="color:#6f42c1" id="sReviewing">-</div>
        <div class="text-muted small">复习中 <i class="bi bi-chevron-right small"></i></div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card border-0 shadow-sm text-center py-3 stat-card" style="cursor:pointer" onclick="showRecords('MASTERED','已掌握')">
        <div class="fs-2 fw-bold text-success" id="sMastered">-</div>
        <div class="text-muted small">已掌握 <i class="bi bi-chevron-right small"></i></div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold text-info" id="sTodayReviews">-</div>
        <div class="text-muted small">今日复习</div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card border-0 shadow-sm text-center py-3">
        <div class="fs-2 fw-bold text-warning" id="sStreak">-</div>
        <div class="text-muted small">连续天数 <i class="bi bi-fire"></i></div>
      </div>
    </div>
  </div>

  <!-- 图表区 -->
  <div class="row g-3">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold border-0">状态分布</div>
        <div class="card-body">
          <canvas id="chartStatus" height="200"></canvas>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold border-0">掌握率</div>
        <div class="card-body d-flex align-items-center justify-content-center">
          <canvas id="chartPie" height="200"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 条目列表弹窗 -->
<div class="modal fade" id="recordsModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="recordsModalTitle">条目列表</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="px-3 pt-3 pb-2 border-bottom d-flex align-items-center gap-2">
          <input class="form-control form-control-sm" id="recordsSearch" placeholder="搜索..." oninput="filterRecords(this.value)" style="max-width:220px">
          <span class="text-muted small ms-auto" id="recordsCount"></span>
        </div>
        <div id="recordsLoading" class="text-center text-muted py-4 small">加载中...</div>
        <table class="table table-sm table-hover mb-0 align-middle" id="recordsTable" style="display:none">
          <thead class="table-light">
            <tr><th class="ps-3">内容</th><th>类型</th><th>下次复习</th></tr>
          </thead>
          <tbody id="recordsTbody"></tbody>
        </table>
        <div id="recordsEmpty" class="text-center text-muted py-4 small" style="display:none">暂无数据</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();

async function loadStats() {
    const s = await Api.study.stats();
    document.getElementById('sTotal').textContent = s.totalRecords;
    document.getElementById('sLearning').textContent = s.learningCount;
    document.getElementById('sReviewing').textContent = s.reviewingCount;
    document.getElementById('sMastered').textContent = s.masteredCount;
    document.getElementById('sTodayReviews').textContent = s.todayReviews;
    document.getElementById('sStreak').textContent = s.streakDays;

    // 柱状图
    new Chart(document.getElementById('chartStatus'), {
        type: 'bar',
        data: {
            labels: ['学习中', '复习中', '已掌握'],
            datasets: [{
                data: [s.learningCount, s.reviewingCount, s.masteredCount],
                backgroundColor: ['#0d6efd', '#6f42c1', '#198754'],
                borderRadius: 6
            }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    // 饼图
    new Chart(document.getElementById('chartPie'), {
        type: 'doughnut',
        data: {
            labels: ['学习中', '复习中', '已掌握'],
            datasets: [{
                data: [s.learningCount, s.reviewingCount, s.masteredCount],
                backgroundColor: ['#0d6efd', '#6f42c1', '#198754']
            }]
        },
        options: { plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
    });
}

const TYPE_LABELS = {
    WORD:'单词', PHRASE:'短语', PARAPHRASE:'同义替换', PRONUNCIATION:'发音',
    GRAMMAR_POINT:'语法', GRAMMAR_EXERCISE:'练习', SPEAKING:'口语',
    LISTENING:'听力', READING:'阅读', WRITING:'写作'
};

const recordsModal = new bootstrap.Modal(document.getElementById('recordsModal'));
let allRecordItems = [];

async function showRecords(status, title) {
    document.getElementById('recordsModalTitle').textContent = title;
    document.getElementById('recordsCount').textContent = '';
    document.getElementById('recordsSearch').value = '';
    document.getElementById('recordsLoading').style.display = '';
    document.getElementById('recordsTable').style.display = 'none';
    document.getElementById('recordsEmpty').style.display = 'none';
    recordsModal.show();
    try {
        allRecordItems = await Api.study.recordsByStatus(status) || [];
        document.getElementById('recordsLoading').style.display = 'none';
        renderRecords(allRecordItems);
    } catch(e) {
        document.getElementById('recordsLoading').textContent = '加载失败：' + e.message;
    }
}

function renderRecords(items) {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('recordsCount').textContent = `共 ${items.length} 条`;
    if (!items.length) {
        document.getElementById('recordsTable').style.display = 'none';
        document.getElementById('recordsEmpty').style.display = '';
        return;
    }
    document.getElementById('recordsEmpty').style.display = 'none';
    document.getElementById('recordsTbody').innerHTML = items.map(item => {
        const label = TYPE_LABELS[item.contentType] || item.contentType;
        const due = item.nextReviewAt || '-';
        const overdue = item.nextReviewAt && item.nextReviewAt <= today;
        return `<tr>
          <td class="ps-3">${escHtml(item.summary || '-')}</td>
          <td><span class="badge bg-light text-secondary fw-normal">${escHtml(label)}</span></td>
          <td class="${overdue ? 'text-danger' : 'text-muted'} small">${due}</td>
        </tr>`;
    }).join('');
    document.getElementById('recordsTable').style.display = '';
}

function filterRecords(q) {
    const kw = q.trim().toLowerCase();
    const filtered = kw ? allRecordItems.filter(i =>
        (i.summary || '').toLowerCase().includes(kw) ||
        (TYPE_LABELS[i.contentType] || '').includes(kw)
    ) : allRecordItems;
    renderRecords(filtered);
}

loadStats().catch(e => { console.error(e); showToast('加载失败', 'danger'); });
</script>
</body>
</html>
