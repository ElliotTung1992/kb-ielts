<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>备考目标 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center mb-4">
    <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none me-3"><i class="bi bi-list"></i></button>
    <h4 class="mb-0 fw-bold"><i class="bi bi-bullseye me-2"></i>备考目标</h4>
  </div>
  <div class="row g-3">
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label">目标总分</label><input id="targetOverallScore" class="form-control" type="number" step="0.5"></div>
            <div class="col-md-4"><label class="form-label">当前总分</label><input id="currentOverallScore" class="form-control" type="number" step="0.5"></div>
            <div class="col-md-4"><label class="form-label">考试日期</label><input id="examDate" class="form-control" type="date"></div>
            <div class="col-md-3"><label class="form-label">听力</label><input id="targetListeningScore" class="form-control" type="number" step="0.5"></div>
            <div class="col-md-3"><label class="form-label">阅读</label><input id="targetReadingScore" class="form-control" type="number" step="0.5"></div>
            <div class="col-md-3"><label class="form-label">写作</label><input id="targetWritingScore" class="form-control" type="number" step="0.5"></div>
            <div class="col-md-3"><label class="form-label">口语</label><input id="targetSpeakingScore" class="form-control" type="number" step="0.5"></div>
            <div class="col-md-4"><label class="form-label">每日分钟</label><input id="dailyMinutes" class="form-control" type="number"></div>
            <div class="col-md-4"><label class="form-label">考试类型</label><select id="trainingType" class="form-select"><option>ACADEMIC</option><option>GENERAL</option></select></div>
            <div class="col-md-4"><label class="form-label">重点技能</label><input id="focusSkills" class="form-control" placeholder="READING,WRITING"></div>
          </div>
          <div class="mt-3"><button class="btn btn-primary" onclick="saveProfile()"><i class="bi bi-save me-1"></i>保存</button></div>
        </div>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 fw-semibold">计划建议</div>
        <div class="card-body" id="suggestion">加载中...</div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
const fields = ['targetOverallScore','targetListeningScore','targetReadingScore','targetWritingScore','targetSpeakingScore','currentOverallScore','examDate','dailyMinutes','trainingType','focusSkills'];
async function loadProfile(){
  const p = await Api.profile.get();
  fields.forEach(k => { const el = document.getElementById(k); if (el) el.value = p[k] ?? ''; });
  const s = await Api.profile.suggestion();
  document.getElementById('suggestion').innerHTML = `<div class="mb-2">${escHtml(s.message)}</div><div class="small text-muted">词汇 ${s.dailyWords}，短语 ${s.dailyPhrases}，阅读 ${s.dailyReadingItems}，写作 ${s.dailyWritingTasks}</div>`;
}
async function saveProfile(){
  const data = {};
  fields.forEach(k => { const v = document.getElementById(k).value; data[k] = v === '' ? null : v; });
  data.dailyMinutes = Number(data.dailyMinutes || 60);
  await Api.profile.save(data);
  showToast('已保存');
  loadProfile();
}
loadProfile().catch(e => showToast(e.message, 'danger'));
</script>
</body>
</html>
