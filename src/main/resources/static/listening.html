<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>听力练习 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none"><i class="bi bi-list"></i></button>
      <h4 class="mb-0 fw-bold"><i class="bi bi-headphones me-2"></i>听力练习</h4>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="openImport()"><i class="bi bi-upload me-1"></i>批量导入</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus me-1"></i>添加练习</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-2"><select class="form-select form-select-sm" id="fDiff"><option value="">全部难度</option><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
        <div class="col-md-2"><select class="form-select form-select-sm" id="fSec"><option value="">全部Section</option><option value="1">Section 1</option><option value="2">Section 2</option><option value="3">Section 3</option><option value="4">Section 4</option></select></div>
        <div class="col-md-3"><input class="form-control form-control-sm" id="fTopic" placeholder="话题标签"></div>
        <div class="col-md-1"><button class="btn btn-primary btn-sm w-100" onclick="loadPage(1)"><i class="bi bi-search"></i></button></div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light"><tr><th>标题</th><th>Section</th><th>题型</th><th>难度</th><th>操作</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
      <span class="text-muted small" id="totalInfo"></span>
      <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-xl"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">添加听力练习</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">标题 *</label><input class="form-control" id="fTitle" required></div>
        <div class="col-md-2"><label class="form-label">Section</label><select class="form-select" id="fSect"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div>
        <div class="col-md-2"><label class="form-label">题型</label><select class="form-select" id="fQT"><option value="form-completion">form-completion</option><option value="note-completion">note-completion</option><option value="table-completion">table-completion</option><option value="multiple-choice">multiple-choice</option><option value="matching">matching</option><option value="map-labelling">map-labelling</option><option value="flow-chart">flow-chart</option></select></div>
        <div class="col-md-2"><label class="form-label">难度</label><select class="form-select" id="fDiffEdit"><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
        <div class="col-md-6"><label class="form-label">场景描述</label><textarea class="form-control" id="fContext" rows="3"></textarea></div>
        <div class="col-md-6"><label class="form-label">脚本片段</label><textarea class="form-control" id="fScript" rows="3"></textarea></div>
        <div class="col-md-6"><label class="form-label">题目（换行分隔）</label><textarea class="form-control" id="fQuestions" rows="4"></textarea></div>
        <div class="col-md-6"><label class="form-label">答案及解析</label><textarea class="form-control" id="fAnswers" rows="4"></textarea></div>
        <div class="col-md-6"><label class="form-label">作答技巧</label><textarea class="form-control" id="fTips" rows="2"></textarea></div>
        <div class="col-md-6"><label class="form-label">话题标签</label><input class="form-control" id="fTopics"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="save()">保存</button></div>
  </div></div>
</div>

<div class="modal fade" id="importModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">批量导入 (JSON)</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><textarea class="form-control font-monospace" id="importJson" rows="12" placeholder='[{"title":"Library Registration","section":1,"questionType":"form-completion","difficulty":1}]'></textarea></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="doImport()">导入</button></div>
  </div></div>
</div>

<!-- 关联管理 Offcanvas -->
<div class="offcanvas offcanvas-end" style="width:420px" tabindex="-1" id="linksOffcanvas">
  <div class="offcanvas-header border-bottom">
    <h6 class="offcanvas-title" id="linksTitle">关联内容</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column gap-3">
    <!-- 添加关联 -->
    <div class="border rounded p-2 bg-light">
      <div class="fw-semibold small mb-2">添加关联</div>
      <div class="mb-2">
        <label class="form-label form-label-sm mb-1">内容类型</label>
        <select class="form-select form-select-sm" id="linkTargetType" onchange="document.getElementById('linkSearch').value='';document.getElementById('linkSearchResults').innerHTML=''">
          <option value="WORD">单词</option>
          <option value="PHRASE">短语</option>
          <option value="PARAPHRASE">同义替换</option>
          <option value="PRONUNCIATION">发音要点</option>
          <option value="GRAMMAR_POINT">语法要点</option>
        </select>
      </div>
      <div class="mb-2 position-relative">
        <label class="form-label form-label-sm mb-1">搜索</label>
        <input class="form-control form-control-sm" id="linkSearch" placeholder="输入关键词搜索" oninput="LinksPanel.onSearchInput()">
        <div id="linkSearchResults" class="list-group position-absolute w-100" style="z-index:1000;top:100%"></div>
      </div>
      <div id="selectedTargetInfo" class="mb-2 min-height-1"></div>
      <div class="mb-2">
        <label class="form-label form-label-sm mb-1">关联类型</label>
        <select class="form-select form-select-sm" id="linkType">
          <option value="vocabulary">词汇</option>
          <option value="paraphrase">同义替换考点</option>
          <option value="signal">信号词</option>
          <option value="pronunciation">发音规律</option>
          <option value="grammar">语法应用</option>
        </select>
      </div>
      <div class="mb-2">
        <label class="form-label form-label-sm mb-1">备注</label>
        <input class="form-control form-control-sm" id="linkNote" placeholder="如：第3题同义替换考点">
      </div>
      <button class="btn btn-primary btn-sm w-100" onclick="LinksPanel.addLink()">添加</button>
    </div>
    <!-- 已关联列表 -->
    <div id="linksList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/nav.js"></script>
<script src="js/links.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
const TYPE='listening-items'; let currentPage=1,editId=null;
const editModal=new bootstrap.Modal(document.getElementById('editModal'));
const importModal=new bootstrap.Modal(document.getElementById('importModal'));

async function loadPage(page=1) {
    currentPage=page;
    const data=await Api.list(TYPE,{difficulty:document.getElementById('fDiff').value,section:document.getElementById('fSec').value,topicTags:document.getElementById('fTopic').value,page,size:20});
    document.getElementById('totalInfo').textContent=`共 ${data.totalElements} 条`;
    document.getElementById('tbody').innerHTML=data.content.map(i=>`
    <tr><td class="fw-semibold">${escHtml(i.title)}</td><td><span class="badge bg-secondary">Section ${i.section}</span></td>
      <td><span class="badge bg-light text-dark">${escHtml(i.questionType||'-')}</span></td>
      <td>${diffBadge(i.difficulty)}</td>
      <td><button class="btn btn-sm btn-outline-primary me-1" onclick='edit(${JSON.stringify(i)})'><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="openLinks('${i.id}','${escHtml(i.title)}')" title="关联内容"><i class="bi bi-link-45deg"></i></button>
        <button class="btn btn-sm btn-outline-success me-1" onclick="startStudy('LISTENING','${i.id}')"><i class="bi bi-play"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="remove('${i.id}')"><i class="bi bi-trash"></i></button></td></tr>`).join('');
    document.getElementById('pagination').innerHTML=Array.from({length:data.totalPages},(_,i2)=>`<li class="page-item${i2+1===data.page+1?' active':''}"><a class="page-link" href="#" onclick="loadPage(${i2+1});return false">${i2+1}</a></li>`).join('');
}

function openAdd(){editId=null;document.getElementById('modalTitle').textContent='添加听力练习';['fTitle','fContext','fScript','fQuestions','fAnswers','fTips','fTopics'].forEach(id=>document.getElementById(id).value='');document.getElementById('fSect').value='1';document.getElementById('fQT').value='form-completion';document.getElementById('fDiffEdit').value='1';editModal.show();}
function openImport(){importModal.show();}
function edit(item){editId=item.id;document.getElementById('modalTitle').textContent='编辑听力练习';document.getElementById('fTitle').value=item.title||'';document.getElementById('fSect').value=item.section||1;document.getElementById('fQT').value=item.questionType||'form-completion';document.getElementById('fContext').value=item.contextDescription||'';document.getElementById('fScript').value=item.scriptExcerpt||'';document.getElementById('fQuestions').value=item.questions||'';document.getElementById('fAnswers').value=item.answers||'';document.getElementById('fTips').value=item.tips||'';document.getElementById('fDiffEdit').value=item.difficulty||1;document.getElementById('fTopics').value=item.topicTags||'';editModal.show();}
async function save(){const body={title:document.getElementById('fTitle').value.trim(),section:parseInt(document.getElementById('fSect').value),questionType:document.getElementById('fQT').value,contextDescription:document.getElementById('fContext').value.trim()||null,scriptExcerpt:document.getElementById('fScript').value.trim()||null,questions:document.getElementById('fQuestions').value.trim()||null,answers:document.getElementById('fAnswers').value.trim()||null,tips:document.getElementById('fTips').value.trim()||null,difficulty:parseInt(document.getElementById('fDiffEdit').value),topicTags:document.getElementById('fTopics').value.trim()||null};try{if(editId)await Api.update(TYPE,editId,body);else await Api.create(TYPE,body);editModal.hide();showToast(editId?'更新成功':'添加成功');loadPage(currentPage);}catch(e){showToast(e.message,'danger');}}
async function remove(id){if(!confirm('确认删除？'))return;try{await Api.remove(TYPE,id);showToast('删除成功');loadPage(currentPage);}catch(e){showToast(e.message,'danger');}}
async function startStudy(type,id){try{await Api.study.start(type,id);showToast('已加入学习计划');}catch(e){showToast(e.message,'danger');}}
function openLinks(id,title){LinksPanel.open(TYPE,id,title);}
async function doImport(){try{const arr=JSON.parse(document.getElementById('importJson').value.trim());const res=await Api.batchImport(TYPE,arr);importModal.hide();showToast(`成功导入 ${res.imported} 条`);loadPage(1);}catch(e){showToast('导入失败: '+e.message,'danger');}}

loadPage(1).catch(e=>showToast('加载失败','danger'));
</script>
</body>
</html>
