<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>今日学习 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none"><i class="bi bi-list"></i></button>
      <h4 class="mb-0 fw-bold"><i class="bi bi-play-circle me-2"></i>今日学习</h4>
    </div>
    <div class="text-muted small">
      <span id="progress">0 / 0</span>
    </div>
  </div>

  <!-- 进度条 -->
  <div class="progress mb-4" style="height:8px">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- 卡片区 -->
  <div id="studyArea">
    <!-- 翻卡 -->
    <div class="flip-scene" id="flipScene" onclick="flipCard()">
      <div class="flip-card" id="flipCard">
        <div class="flip-front">
          <div class="flip-word" id="cardFront">加载中...</div>
          <div class="flip-phonetic" id="cardPhonetic"></div>
          <div class="flip-hint">点击查看答案</div>
        </div>
        <div class="flip-back">
          <div class="fw-bold fs-5 mb-2" id="cardBack"></div>
          <div class="text-muted small mb-2" id="cardExample"></div>
          <div class="text-muted small" id="cardExtra"></div>
          <div id="cardLinkedItems" class="mt-3"></div>
        </div>
      </div>
    </div>

    <!-- 内容信息 -->
    <div class="text-center mt-3 mb-4">
      <span class="badge bg-secondary me-1" id="cardType"></span>
      <span class="badge bg-light text-dark" id="cardDiff"></span>
    </div>

    <!-- 评分按钮（翻牌后显示） -->
    <div class="d-flex justify-content-center rating-btns mt-2" id="ratingArea" style="display:none!important">
      <button class="btn btn-again rounded-pill px-4" onclick="rate('AGAIN')">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Again
      </button>
      <button class="btn btn-hard rounded-pill px-4" onclick="rate('HARD')">
        <i class="bi bi-exclamation me-1"></i>难
      </button>
      <button class="btn btn-good rounded-pill px-4" onclick="rate('GOOD')">
        <i class="bi bi-check me-1"></i>良好
      </button>
      <button class="btn btn-easy rounded-pill px-4" onclick="rate('EASY')">
        <i class="bi bi-stars me-1"></i>简单
      </button>
    </div>
  </div>

  <!-- 完成界面 -->
  <div id="doneArea" class="text-center py-5" style="display:none">
    <i class="bi bi-trophy-fill text-warning" style="font-size:4rem"></i>
    <h3 class="mt-3 fw-bold">今日任务完成！</h3>
    <p class="text-muted">继续保持，明天见！</p>
    <a href="stats.html" class="btn btn-primary me-2"><i class="bi bi-bar-chart me-1"></i>查看统计</a>
    <a href="index.html" class="btn btn-outline-secondary"><i class="bi bi-house me-1"></i>返回首页</a>
  </div>

  <!-- 无任务提示 -->
  <div id="emptyArea" style="display:none">
    <div class="text-center py-4">
      <i class="bi bi-check-circle-fill text-success" style="font-size:3rem"></i>
      <h4 class="mt-3 fw-bold">今日无待复习内容</h4>
      <p class="text-muted mb-3">去内容库添加新内容，系统会自动加入明日计划</p>
    </div>
    <div class="row g-2">
      <div class="col-6 col-md-3"><a href="words.html" class="btn btn-outline-secondary w-100"><i class="bi bi-alphabet me-1"></i>单词</a></div>
      <div class="col-6 col-md-3"><a href="phrases.html" class="btn btn-outline-secondary w-100"><i class="bi bi-chat-quote me-1"></i>短语</a></div>
      <div class="col-6 col-md-3"><a href="grammar-points.html" class="btn btn-outline-secondary w-100"><i class="bi bi-book me-1"></i>语法</a></div>
      <div class="col-6 col-md-3"><a href="grammar-exercises.html" class="btn btn-outline-secondary w-100"><i class="bi bi-pencil-square me-1"></i>练习</a></div>
      <div class="col-6 col-md-3"><a href="speaking.html" class="btn btn-outline-secondary w-100"><i class="bi bi-megaphone me-1"></i>口语</a></div>
      <div class="col-6 col-md-3"><a href="listening.html" class="btn btn-outline-secondary w-100"><i class="bi bi-headphones me-1"></i>听力</a></div>
      <div class="col-6 col-md-3"><a href="reading.html" class="btn btn-outline-secondary w-100"><i class="bi bi-file-text me-1"></i>阅读</a></div>
      <div class="col-6 col-md-3"><a href="writing.html" class="btn btn-outline-secondary w-100"><i class="bi bi-pen me-1"></i>写作</a></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();

let items = [];
let cursor = 0;
let currentRecord = null;
let flipped = false;

const TYPE_LABELS = {
    WORD:'单词', PHRASE:'短语', PARAPHRASE:'同义替换', PRONUNCIATION:'发音',
    GRAMMAR_POINT:'语法', GRAMMAR_EXERCISE:'练习', SPEAKING:'口语',
    LISTENING:'听力', READING:'阅读', WRITING:'写作'
};

async function init() {
    const plan = await Api.study.todayPlan();
    items = plan.items || [];
    if (items.length === 0) {
        document.getElementById('studyArea').style.display = 'none';
        document.getElementById('emptyArea').style.display = '';
        return;
    }
    updateProgress();
    showItem();
}

function updateProgress() {
    const done = cursor;
    const total = items.length;
    document.getElementById('progress').textContent = `${done} / ${total}`;
    document.getElementById('progressBar').style.width = `${total ? (done/total*100) : 0}%`;
}

async function showItem() {
    if (cursor >= items.length) {
        document.getElementById('studyArea').style.display = 'none';
        document.getElementById('doneArea').style.display = '';
        return;
    }
    currentRecord = items[cursor];
    flipped = false;
    document.getElementById('flipCard').classList.remove('flipped');
    document.getElementById('ratingArea').style.setProperty('display', 'none', 'important');

    // 新学项先创建学习记录，拿到 recordId
    if (currentRecord.studyMode === 'NEW' && !currentRecord.recordId) {
        try {
            const record = await Api.study.start(currentRecord.contentType, currentRecord.contentId);
            currentRecord.recordId = record.id;
        } catch(e) {
            console.warn('创建学习记录失败', e);
        }
    }

    // 加载内容详情
    const type = currentRecord.contentType;
    const typeMap = {
        WORD: 'words', PHRASE: 'phrases', PARAPHRASE: 'paraphrase-groups',
        PRONUNCIATION: 'pronunciation-points', GRAMMAR_POINT: 'grammar-points',
        GRAMMAR_EXERCISE: 'grammar-exercises', SPEAKING: 'speaking-topics',
        LISTENING: 'listening-items', READING: 'reading-items', WRITING: 'writing-tasks'
    };
    try {
        const content = await Api.getById(typeMap[type], currentRecord.contentId);
        renderCard(type, content, currentRecord);
    } catch(e) {
        // 内容已删除，跳过
        cursor++;
        updateProgress();
        showItem();
    }
}

function renderCard(type, c, record) {
    let front = '', phonetic = '', back = '', example = '', extra = '';
    switch(type) {
        case 'WORD': {
            front = c.word;
            phonetic = [c.phoneticUk && `UK: ${c.phoneticUk}`, c.phoneticUs && `US: ${c.phoneticUs}`].filter(Boolean).join('  ');
            back = c.definitionZh || c.definitionEn;
            const ex0 = c.examples && c.examples[0];
            example = ex0 ? ex0.sentence : '';
            extra = ex0 ? ex0.translation : '';
            break;
        }
        case 'PHRASE': {
            front = c.phrase;
            back = c.meaningZh;
            const ph0 = c.examples && c.examples[0];
            example = ph0 ? ph0.sentence : '';
            extra = ph0 ? ph0.translation : '';
            break;
        }
        case 'PARAPHRASE': {
            front = c.coreExpression;
            back = c.synonyms;
            const pa0 = c.examples && c.examples[0];
            example = pa0 ? pa0.sentence : '';
            extra = pa0 ? pa0.translation : '';
            break;
        }
        case 'PRONUNCIATION':
            front = c.title;
            back = c.ruleSummary;
            example = c.examples ? c.examples.map(e => e.sentence).filter(Boolean).join('\n') : '';
            break;
        case 'GRAMMAR_POINT':
            front = c.title;
            back = c.explanationZh;
            example = c.examples ? c.examples.map(e => e.sentence).filter(Boolean).join('\n') : '';
            break;
        case 'GRAMMAR_EXERCISE':
            front = c.question;
            back = c.answer;
            example = c.explanation;
            break;
        case 'SPEAKING':
            front = c.question || c.title;
            back = c.referenceAnswer;
            break;
        case 'LISTENING':
            front = c.title;
            back = c.questions;
            example = c.answers;
            break;
        case 'READING':
            front = c.title;
            back = c.questionType;
            example = c.tips;
            break;
        case 'WRITING':
            front = c.title;
            back = (c.taskNumber ? `Task ${c.taskNumber} · ` : '') + (c.taskType || '');
            example = c.prompt;
            break;
    }
    document.getElementById('cardFront').textContent = front;
    document.getElementById('cardPhonetic').textContent = phonetic;
    document.getElementById('cardBack').textContent = back || '-';
    document.getElementById('cardExample').textContent = example || '';
    document.getElementById('cardExtra').textContent = extra || '';
    document.getElementById('cardType').textContent = TYPE_LABELS[type] || type;
    document.getElementById('cardDiff').innerHTML = diffBadge(c.difficulty);
    renderLinkedItems(record.linkedItems);
}

const TARGET_TYPE_ZH = {
    WORD: '词汇', PHRASE: '短语', PARAPHRASE: '同义替换', PRONUNCIATION: '发音', GRAMMAR_POINT: '语法要点'
};

function renderLinkedItems(links) {
    const el = document.getElementById('cardLinkedItems');
    if (!links || !links.length) { el.innerHTML = ''; return; }
    // 按 targetType 分组
    const groups = {};
    links.forEach(l => { const g = l.targetType || 'WORD'; if (!groups[g]) groups[g] = []; groups[g].push(l); });
    el.innerHTML = `<hr class="my-2"><div class="text-secondary fw-semibold" style="font-size:0.8em">相关内容</div>` +
        Object.entries(groups).map(([type, items]) =>
            `<div class="mt-1 small"><span class="text-muted">${escHtml(TARGET_TYPE_ZH[type] || type)}：</span>` +
            items.map(l => `<span class="badge bg-light text-dark me-1">${escHtml(l.targetSummary||'')}</span>`).join('') +
            `</div>`
        ).join('');
}

function flipCard() {
    if (flipped) return;
    flipped = true;
    document.getElementById('flipCard').classList.add('flipped');
    document.getElementById('ratingArea').style.setProperty('display', 'flex', 'important');
}

async function rate(rating) {
    if (!currentRecord) return;
    try {
        await Api.study.review(currentRecord.recordId, rating);
        cursor++;
        updateProgress();
        showItem();
    } catch(e) {
        showToast('提交失败: ' + e.message, 'danger');
    }
}

init().catch(e => { console.error(e); showToast('加载失败', 'danger'); });
</script>
</body>
</html>
