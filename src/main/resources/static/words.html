<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>单词库 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none"><i class="bi bi-list"></i></button>
      <h4 class="mb-0 fw-bold"><i class="bi bi-alphabet me-2"></i>单词库</h4>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="openImport()"><i class="bi bi-upload me-1"></i>批量导入</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus me-1"></i>添加单词</button>
    </div>
  </div>

  <!-- 筛选 -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-6 col-md-2">
          <select class="form-select form-select-sm" id="fDiff">
            <option value="">全部难度</option>
            <option value="1">基础</option><option value="2">中级</option><option value="3">高级</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <select class="form-select form-select-sm" id="fWordList">
            <option value="">全部词表</option>
            <option value="AWL">AWL</option><option value="GSL">GSL</option><option value="IELTS">IELTS</option>
          </select>
        </div>
        <div class="col-md-3">
          <input class="form-control form-control-sm" id="fTopic" placeholder="话题标签">
        </div>
        <div class="col-md-1">
          <button class="btn btn-primary btn-sm w-100" onclick="loadPage(1)"><i class="bi bi-search"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- 表格 -->
  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr><th>单词</th><th>音标</th><th>词性</th><th>中文释义</th><th>难度</th><th>词表</th><th>操作</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
      <span class="text-muted small" id="totalInfo"></span>
      <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
    </div>
  </div>
</div>

<!-- 添加/编辑 Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">添加单词</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">单词 *</label><input class="form-control" id="fWord" required></div>
          <div class="col-md-3"><label class="form-label">英式音标</label><input class="form-control" id="fPhoneticUk"></div>
          <div class="col-md-3"><label class="form-label">美式音标</label><input class="form-control" id="fPhoneticUs"></div>
          <div class="col-md-3"><label class="form-label">词性</label><input class="form-control" id="fPos" placeholder="n./v./adj."></div>
          <div class="col-md-3"><label class="form-label">频率(1-5)</label><input class="form-control" type="number" id="fFreq" min="1" max="5"></div>
          <div class="col-md-3"><label class="form-label">词表</label>
            <select class="form-select" id="fWl"><option value="">-</option><option>AWL</option><option>GSL</option><option>IELTS</option></select></div>
          <div class="col-md-3"><label class="form-label">难度</label>
            <select class="form-select" id="fDiffEdit"><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
          <div class="col-md-6"><label class="form-label">中文释义</label><textarea class="form-control" id="fDefZh" rows="2"></textarea></div>
          <div class="col-md-6"><label class="form-label">英文释义</label><textarea class="form-control" id="fDefEn" rows="2"></textarea></div>
          <div class="col-12">
            <label class="form-label">例句</label>
            <div id="examplesContainer"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="addExRow()"><i class="bi bi-plus me-1"></i>添加例句</button>
          </div>
          <div class="col-md-6"><label class="form-label">适用技能</label><input class="form-control" id="fSkills" placeholder="listening,writing"></div>
          <div class="col-md-6"><label class="form-label">话题标签</label><input class="form-control" id="fTopics" placeholder="education,environment"></div>
          <div class="col-md-6"><label class="form-label">关联词</label><input class="form-control" id="fRelated" placeholder="同义词/反义词等关联词"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="save()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 批量导入 Modal -->
<div class="modal fade" id="importModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">批量导入单词 (JSON)</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <p class="text-muted small">粘贴 JSON 数组，每个对象包含 word, definitionZh 等字段</p>
        <textarea class="form-control font-monospace" id="importJson" rows="12" placeholder='[{"word":"abandon","definitionZh":"放弃","difficulty":2}]'></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="doImport()">导入</button>
      </div>
    </div>
  </div>
</div>

<!-- 反向引用 Offcanvas -->
<div class="offcanvas offcanvas-end" style="width:380px" tabindex="-1" id="backlinksOffcanvas">
  <div class="offcanvas-header border-bottom">
    <h6 class="offcanvas-title" id="backlinksTitle">被引用位置</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div id="backlinksList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/backlinks.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();

const TYPE = 'words';
let currentPage = 1, totalPages = 1, editId = null;
const editModal = new bootstrap.Modal(document.getElementById('editModal'));
const importModal = new bootstrap.Modal(document.getElementById('importModal'));

async function loadPage(page = 1) {
    currentPage = page;
    const params = {
        difficulty: document.getElementById('fDiff').value,
        wordList: document.getElementById('fWordList').value,
        topicTags: document.getElementById('fTopic').value,
        page, size: 20
    };
    const data = await Api.list(TYPE, params);
    totalPages = data.totalPages;
    document.getElementById('totalInfo').textContent = `共 ${data.totalElements} 条`;
    renderTable(data.content);
    renderPagination(data.page + 1, data.totalPages);
}

function renderTable(rows) {
    document.getElementById('tbody').innerHTML = rows.map(w => `
    <tr>
      <td class="fw-semibold">${escHtml(w.word)}</td>
      <td class="text-muted small">${escHtml(w.phoneticUk || '')} ${escHtml(w.phoneticUs || '')}</td>
      <td><span class="badge bg-light text-dark">${escHtml(w.partOfSpeech || '-')}</span></td>
      <td>${escHtml(w.definitionZh || '')}</td>
      <td>${diffBadge(w.difficulty)}</td>
      <td>${escHtml(w.wordList || '-')}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" data-id="${w.id}" onclick="editById(this.dataset.id)"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm ${(w.linkCount||0)>0?'btn-outline-info':'btn-outline-secondary'} me-1" onclick="openBacklinks('${w.id}','${escHtml(w.word)}')" title="被引用位置"><i class="bi bi-arrow-return-left"></i>${(w.linkCount||0)>0?`<sup>${w.linkCount}</sup>`:''}</button>
        <button class="btn btn-sm btn-outline-success me-1" onclick="startStudy('WORD','${w.id}')"><i class="bi bi-play"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="remove('${w.id}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}

function renderPagination(page, total) {
    const ul = document.getElementById('pagination');
    ul.innerHTML = '';
    for (let i = 1; i <= total; i++) {
        const li = document.createElement('li');
        li.className = `page-item${i === page ? ' active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="loadPage(${i});return false">${i}</a>`;
        ul.appendChild(li);
    }
}

function openAdd() { editId = null; document.getElementById('modalTitle').textContent = '添加单词'; clearForm(); editModal.show(); }
function openImport() { importModal.show(); }

async function editById(id) {
    try {
        const w = await Api.getById(TYPE, id);
        edit(w);
    } catch(e) { showToast('加载失败', 'danger'); }
}

function edit(w) {
    editId = w.id;
    document.getElementById('modalTitle').textContent = '编辑单词';
    document.getElementById('fWord').value = w.word || '';
    document.getElementById('fPhoneticUk').value = w.phoneticUk || '';
    document.getElementById('fPhoneticUs').value = w.phoneticUs || '';
    document.getElementById('fPos').value = w.partOfSpeech || '';
    document.getElementById('fFreq').value = w.frequencyLevel || '';
    document.getElementById('fWl').value = w.wordList || '';
    document.getElementById('fDiffEdit').value = w.difficulty || 1;
    document.getElementById('fDefZh').value = w.definitionZh || '';
    document.getElementById('fDefEn').value = w.definitionEn || '';
    document.getElementById('examplesContainer').innerHTML = '';
    (w.examples || []).forEach(e => addExRow(e.sentence || '', e.translation || ''));
    document.getElementById('fSkills').value = w.skillTags || '';
    document.getElementById('fTopics').value = w.topicTags || '';
    document.getElementById('fRelated').value = w.relatedWords || '';
    editModal.show();
}

function addExRow(sen = '', trans = '') {
    const container = document.getElementById('examplesContainer');
    const div = document.createElement('div');
    div.className = 'row g-2 mb-2 ex-row';
    div.innerHTML = `<div class="col-md-6"><input class="form-control form-control-sm ex-sen" placeholder="例句（英文）" value="${escHtml(sen)}"></div>
      <div class="col-md-5"><input class="form-control form-control-sm ex-trans" placeholder="翻译（中文）" value="${escHtml(trans)}"></div>
      <div class="col-md-1"><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.ex-row').remove()"><i class="bi bi-trash"></i></button></div>`;
    container.appendChild(div);
}

function clearForm() {
    ['fWord','fPhoneticUk','fPhoneticUs','fPos','fFreq','fWl','fDefZh','fDefEn','fSkills','fTopics','fRelated'].forEach(id => {
        document.getElementById(id).value = '';
    });
    document.getElementById('fDiffEdit').value = '1';
    document.getElementById('examplesContainer').innerHTML = '';
}

async function save() {
    const body = {
        word: document.getElementById('fWord').value.trim(),
        phoneticUk: document.getElementById('fPhoneticUk').value.trim() || null,
        phoneticUs: document.getElementById('fPhoneticUs').value.trim() || null,
        partOfSpeech: document.getElementById('fPos').value.trim() || null,
        frequencyLevel: parseInt(document.getElementById('fFreq').value) || null,
        wordList: document.getElementById('fWl').value || null,
        difficulty: parseInt(document.getElementById('fDiffEdit').value),
        definitionZh: document.getElementById('fDefZh').value.trim() || null,
        definitionEn: document.getElementById('fDefEn').value.trim() || null,
        examples: Array.from(document.querySelectorAll('.ex-row')).map((row, i) => ({
            sentence: row.querySelector('.ex-sen').value.trim() || null,
            translation: row.querySelector('.ex-trans').value.trim() || null,
            sortOrder: i
        })).filter(e => e.sentence),
        skillTags: document.getElementById('fSkills').value.trim() || null,
        topicTags: document.getElementById('fTopics').value.trim() || null,
        relatedWords: document.getElementById('fRelated').value.trim() || null,
    };
    try {
        if (editId) await Api.update(TYPE, editId, body);
        else await Api.create(TYPE, body);
        editModal.hide();
        showToast(editId ? '更新成功' : '添加成功');
        loadPage(currentPage);
    } catch(e) { showToast(e.message, 'danger'); }
}

async function remove(id) {
    if (!confirm('确认删除？')) return;
    try { await Api.remove(TYPE, id); showToast('删除成功'); loadPage(currentPage); }
    catch(e) { showToast(e.message, 'danger'); }
}

async function startStudy(type, id) {
    try { await Api.study.start(type, id); showToast('已加入学习计划'); }
    catch(e) { showToast(e.message, 'danger'); }
}

function openBacklinks(id, label) { BacklinksPanel.open(TYPE, id, label); }

async function doImport() {
    const raw = document.getElementById('importJson').value.trim();
    try {
        const arr = JSON.parse(raw);
        const res = await Api.batchImport(TYPE, arr);
        importModal.hide();
        showToast(`成功导入 ${res.imported} 条`);
        loadPage(1);
    } catch(e) { showToast('JSON 格式错误或导入失败: ' + e.message, 'danger'); }
}

loadPage(1).catch(e => showToast('加载失败', 'danger'));
</script>
</body>
</html>
