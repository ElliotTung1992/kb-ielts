<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>作文记录 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div><div id="main">
<div class="d-flex align-items-center mb-4"><button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none me-3"><i class="bi bi-list"></i></button><h4 class="mb-0 fw-bold"><i class="bi bi-journal-check me-2"></i>作文记录</h4></div>
<div class="card border-0 shadow-sm mb-3"><div class="card-body"><textarea id="originalText" class="form-control mb-2" rows="5" placeholder="粘贴作文原文"></textarea><button class="btn btn-primary" onclick="save()">保存记录</button></div></div>
<div id="list"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script src="js/api.js"></script><script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
async function load(){ const rows = await Api.writingSubmissions.list(); document.getElementById('list').innerHTML = rows.map(r=>`<div class="card border-0 shadow-sm mb-2"><div class="card-body"><div class="small text-muted">${fmtDate(r.createdAt)}</div><div>${escHtml((r.originalText||'').slice(0,180))}</div></div></div>`).join(''); }
async function save(){ const text = document.getElementById('originalText').value.trim(); if(!text) return; await Api.writingSubmissions.create({originalText:text}); document.getElementById('originalText').value=''; showToast('已保存'); load(); }
load().catch(e=>showToast(e.message,'danger'));
</script></body></html>
