<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>口语话题 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none"><i class="bi bi-list"></i></button>
      <h4 class="mb-0 fw-bold"><i class="bi bi-chat-dots me-2"></i>口语话题</h4>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="openImport()"><i class="bi bi-upload me-1"></i>批量导入</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus-lg me-1"></i>添加话题</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-2">
          <label class="form-label small text-muted mb-1">难度</label>
          <select class="form-select form-select-sm" id="filterDiff">
            <option value="">全部难度</option><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small text-muted mb-1">Part</label>
          <select class="form-select form-select-sm" id="filterPart">
            <option value="">全部 Part</option><option value="1">Part 1</option><option value="2">Part 2</option><option value="3">Part 3</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small text-muted mb-1">状态</label>
          <select class="form-select form-select-sm" id="filterStatus">
            <option value="">全部状态</option><option value="NEW">待学习</option><option value="LEARNING">学习中</option><option value="REVIEWING">复习中</option><option value="MASTERED">已掌握</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label small text-muted mb-1">话题标签</label>
          <input class="form-control form-control-sm" id="filterTopic" placeholder="work,travel,technology">
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary btn-sm w-100" onclick="loadPage(1)"><i class="bi bi-search me-1"></i>筛选</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr><th style="width:26%">话题</th><th style="width:10%">Part</th><th>问题</th><th style="width:12%">状态</th><th style="width:10%">难度</th><th style="width:142px">操作</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
      <span class="text-muted small" id="totalInfo"></span>
      <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title" id="modalTitle">添加口语话题</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-md-7">
          <label class="form-label">话题标题 *</label>
          <input class="form-control" id="topicTitle" maxlength="200" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Part *</label>
          <select class="form-select" id="topicPart">
            <option value="1">Part 1</option><option value="2">Part 2</option><option value="3">Part 3</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">难度</label>
          <select class="form-select" id="topicDifficulty">
            <option value="1">基础</option><option value="2">中级</option><option value="3">高级</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">问题 *</label>
          <textarea class="form-control" id="topicQuestion" rows="6" required></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">参考答案思路</label>
          <textarea class="form-control" id="topicAnswer" rows="5"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">话题标签</label>
          <input class="form-control" id="topicTags" placeholder="work,travel,technology">
        </div>
      </div>
      <div id="modalLinksContainer" class="mt-4"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()"><i class="bi bi-check2 me-1"></i>保存</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="importModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">批量导入 JSON</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><textarea class="form-control font-monospace" id="importJson" rows="12" placeholder='[{"title":"Technology","part":1,"question":"Do you use technology often?","difficulty":1}]'></textarea></div>
    <div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="doImport()">导入</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/nav.js"></script>
<script src="js/links.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
const TYPE = 'speaking-topics';
let currentPage = 1;
let editId = null;
let topicCache = new Map();
const editModal = new bootstrap.Modal(document.getElementById('editModal'));
const importModal = new bootstrap.Modal(document.getElementById('importModal'));

async function loadPage(page = 1) {
    currentPage = page;
    const params = {
        difficulty: document.getElementById('filterDiff').value,
        part: document.getElementById('filterPart').value,
        studyStatus: document.getElementById('filterStatus').value,
        topicTags: document.getElementById('filterTopic').value,
        page,
        size: 20
    };
    const data = await Api.list(TYPE, params);
    topicCache = new Map(data.content.map(topic => [topic.id, topic]));
    document.getElementById('totalInfo').textContent = `共 ${data.totalElements} 条`;
    document.getElementById('tbody').innerHTML = data.content.length ? data.content.map(renderRow).join('') : renderEmpty();
    document.getElementById('pagination').innerHTML = renderPagination(data);
}

function renderRow(t) {
    return `
    <tr>
      <td>
        <div class="fw-semibold">${escHtml(t.title)}</div>
        <div class="mt-1">${renderTags(t.topicTags)}</div>
      </td>
      <td><span class="badge bg-primary">Part ${t.part}</span></td>
      <td class="small text-muted">${escHtml(compact(t.question, 96))}</td>
      <td>${studyStatusBadge(t.studyStatus)}</td>
      <td>${diffBadge(t.difficulty)}</td>
      <td>
        <div class="d-flex gap-1">
          <button class="btn btn-sm btn-outline-primary" title="编辑" onclick="editById('${t.id}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-success" title="加入学习" onclick="startStudy('SPEAKING','${t.id}')"><i class="bi bi-play"></i></button>
          <button class="btn btn-sm btn-outline-danger" title="删除" onclick="remove('${t.id}')"><i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`;
}

function renderEmpty() {
    return `<tr><td colspan="6" class="text-center text-muted py-5">暂无口语话题</td></tr>`;
}

function renderPagination(data) {
    if (!data.totalPages || data.totalPages <= 1) return '';
    return Array.from({length: data.totalPages}, (_, i) => {
        const page = i + 1;
        const active = page === data.page + 1 ? ' active' : '';
        return `<li class="page-item${active}"><a class="page-link" href="#" onclick="loadPage(${page});return false">${page}</a></li>`;
    }).join('');
}

function openAdd() {
    editId = null;
    document.getElementById('modalTitle').textContent = '添加口语话题';
    setFormValues({ part: 1, difficulty: 1 });
    LinksPanel.initInline(TYPE, null, 'modalLinksContainer');
    editModal.show();
}

function openImport() {
    importModal.show();
}

function editById(id) {
    const topic = topicCache.get(id);
    if (!topic) return;
    editId = id;
    document.getElementById('modalTitle').textContent = '编辑口语话题';
    setFormValues(topic);
    LinksPanel.initInline(TYPE, editId, 'modalLinksContainer');
    editModal.show();
}

function setFormValues(topic) {
    document.getElementById('topicTitle').value = topic.title || '';
    document.getElementById('topicPart').value = topic.part || 1;
    document.getElementById('topicQuestion').value = topic.question || '';
    document.getElementById('topicAnswer').value = topic.referenceAnswer || '';
    document.getElementById('topicDifficulty').value = topic.difficulty || 1;
    document.getElementById('topicTags').value = topic.topicTags || '';
}

async function save() {
    const body = readForm();
    if (!body.title || !body.question) {
        showToast('请填写话题标题和问题', 'warning');
        return;
    }
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    try {
        if (editId) {
            await Api.update(TYPE, editId, body);
            editModal.hide();
            showToast('更新成功');
            await loadPage(currentPage);
        } else {
            const created = await Api.create(TYPE, body);
            editId = created.id;
            document.getElementById('modalTitle').textContent = '编辑口语话题';
            showToast('添加成功，可继续添加关联');
            await loadPage(1);
            LinksPanel.initInline(TYPE, editId, 'modalLinksContainer');
        }
    } catch (e) {
        showToast(e.message, 'danger');
    } finally {
        saveBtn.disabled = false;
    }
}

function readForm() {
    return {
        title: document.getElementById('topicTitle').value.trim(),
        part: parseInt(document.getElementById('topicPart').value, 10),
        question: document.getElementById('topicQuestion').value.trim(),
        referenceAnswer: document.getElementById('topicAnswer').value.trim() || null,
        difficulty: parseInt(document.getElementById('topicDifficulty').value, 10),
        topicTags: document.getElementById('topicTags').value.trim() || null
    };
}

async function remove(id) {
    if (!confirm('确认删除？')) return;
    try {
        await Api.remove(TYPE, id);
        showToast('删除成功');
        await loadPage(currentPage);
    } catch (e) {
        showToast(e.message, 'danger');
    }
}

async function startStudy(type, id) {
    try {
        await Api.study.start(type, id);
        showToast('已加入学习计划');
        await loadPage(currentPage);
    } catch (e) {
        showToast(e.message, 'danger');
    }
}

async function doImport() {
    try {
        const arr = JSON.parse(document.getElementById('importJson').value.trim());
        const res = await Api.batchImport(TYPE, arr);
        importModal.hide();
        showToast(`成功导入 ${res.imported} 条`);
        await loadPage(1);
    } catch (e) {
        showToast('导入失败: ' + e.message, 'danger');
    }
}

function renderTags(tags) {
    if (!tags) return '';
    return String(tags).split(',').map(t => t.trim()).filter(Boolean)
        .map(t => `<span class="badge bg-light text-dark border me-1">${escHtml(t)}</span>`).join('');
}

function compact(value, limit) {
    const text = value || '';
    return text.length > limit ? text.substring(0, limit) + '...' : text;
}

function studyStatusBadge(status) {
    if (!status) return '<span class="badge bg-light text-dark border">待学习</span>';
    return statusBadge(status);
}

attachTopicTagDatalist(['topicTags', 'filterTopic']);
loadPage(1).catch(e => showToast(e.message || '加载失败', 'danger'));
</script>
</body>
</html>
