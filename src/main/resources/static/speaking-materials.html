<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>口语素材 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div><div id="main">
<div class="d-flex align-items-center mb-4"><button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none me-3"><i class="bi bi-list"></i></button><h4 class="mb-0 fw-bold"><i class="bi bi-card-text me-2"></i>口语素材</h4></div>
<div class="card border-0 shadow-sm mb-3"><div class="card-body row g-2"><div class="col-md-3"><input id="category" class="form-control" placeholder="类别"></div><div class="col-md-3"><input id="title" class="form-control" placeholder="标题"></div><div class="col-md-6"><input id="content" class="form-control" placeholder="素材内容"></div><div class="col-12"><button class="btn btn-primary" onclick="save()">保存素材</button></div></div></div>
<div id="list"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script src="js/api.js"></script><script src="js/nav.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
async function load(){ const rows = await Api.speakingMaterials.list(); document.getElementById('list').innerHTML = rows.map(r=>`<div class="card border-0 shadow-sm mb-2"><div class="card-body"><span class="badge bg-light text-dark">${escHtml(r.category)}</span><div class="fw-semibold mt-1">${escHtml(r.title)}</div><div class="small text-muted">${escHtml(r.content)}</div></div></div>`).join(''); }
async function save(){ const data={category:category.value||'experience', title:title.value, content:content.value}; if(!data.title||!data.content) return; await Api.speakingMaterials.create(data); title.value=''; content.value=''; showToast('已保存'); load(); }
load().catch(e=>showToast(e.message,'danger'));
</script></body></html>
