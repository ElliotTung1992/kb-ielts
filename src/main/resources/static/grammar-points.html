<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>语法要点 - IELTS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/ielts.css">
</head>
<body>
<div id="sidebarMount"></div>
<div id="main">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebarToggler" class="btn btn-sm btn-outline-secondary d-md-none"><i class="bi bi-list"></i></button>
      <h4 class="mb-0 fw-bold"><i class="bi bi-book me-2"></i>语法要点</h4>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="openImport()"><i class="bi bi-upload me-1"></i>批量导入</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus me-1"></i>添加要点</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-2"><select class="form-select form-select-sm" id="fDiff"><option value="">全部难度</option><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
        <div class="col-md-2">
          <select class="form-select form-select-sm" id="fCat">
            <option value="">全部分类</option><option value="tense">tense</option><option value="conditional">conditional</option><option value="passive">passive</option><option value="relative-clause">relative-clause</option><option value="modal">modal</option><option value="comparison">comparison</option><option value="article">article</option><option value="sentence-structure">sentence-structure</option>
          </select>
        </div>
        <div class="col-md-3"><input class="form-control form-control-sm" id="fTopic" placeholder="话题标签"></div>
        <div class="col-md-1"><button class="btn btn-primary btn-sm w-100" onclick="loadPage(1)"><i class="bi bi-search"></i></button></div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light"><tr><th>标题</th><th>分类</th><th>核心规则（摘要）</th><th>难度</th><th>操作</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
      <span class="text-muted small" id="totalInfo"></span>
      <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">添加语法要点</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label">标题 *</label><input class="form-control" id="fTitle" required></div>
        <div class="col-md-4"><label class="form-label">分类</label>
          <select class="form-select" id="fCatEdit"><option value="">-</option><option value="tense">tense</option><option value="conditional">conditional</option><option value="passive">passive</option><option value="relative-clause">relative-clause</option><option value="modal">modal</option><option value="comparison">comparison</option><option value="article">article</option><option value="sentence-structure">sentence-structure</option></select>
        </div>
        <div class="col-md-6"><label class="form-label">中文讲解</label><textarea class="form-control" id="fExplZh" rows="3"></textarea></div>
        <div class="col-md-6"><label class="form-label">英文讲解</label><textarea class="form-control" id="fExplEn" rows="3"></textarea></div>
        <div class="col-md-6"><label class="form-label">核心规则（换行分隔）</label><textarea class="form-control" id="fRules" rows="4"></textarea></div>
        <div class="col-md-6">
          <label class="form-label">典型例句</label>
          <div id="examplesContainer"></div>
          <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="addExRow()"><i class="bi bi-plus me-1"></i>添加</button>
        </div>
        <div class="col-md-6"><label class="form-label">常见错误</label><textarea class="form-control" id="fErrors" rows="3"></textarea></div>
        <div class="col-md-2"><label class="form-label">难度</label><select class="form-select" id="fDiffEdit"><option value="1">基础</option><option value="2">中级</option><option value="3">高级</option></select></div>
        <div class="col-md-4"><label class="form-label">适用技能</label><input class="form-control" id="fSkills" placeholder="writing,speaking"></div>
        <div class="col-md-6"><label class="form-label">话题标签</label><input class="form-control" id="fTopics"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="save()">保存</button></div>
  </div></div>
</div>

<div class="modal fade" id="importModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">批量导入 (JSON)</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><textarea class="form-control font-monospace" id="importJson" rows="12" placeholder='[{"title":"Perfect Tenses","category":"tense","difficulty":2}]'></textarea></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="doImport()">导入</button></div>
  </div></div>
</div>

<!-- 反向引用 Offcanvas -->
<div class="offcanvas offcanvas-end" style="width:380px" tabindex="-1" id="backlinksOffcanvas">
  <div class="offcanvas-header border-bottom">
    <h6 class="offcanvas-title" id="backlinksTitle">被引用位置</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body"><div id="backlinksList"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/nav.js"></script>
<script src="js/backlinks.js"></script>
<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar();
const TYPE='grammar-points'; let currentPage=1,editId=null;
const editModal=new bootstrap.Modal(document.getElementById('editModal'));
const importModal=new bootstrap.Modal(document.getElementById('importModal'));

async function loadPage(page=1) {
    currentPage=page;
    const data=await Api.list(TYPE,{difficulty:document.getElementById('fDiff').value,category:document.getElementById('fCat').value,topicTags:document.getElementById('fTopic').value,page,size:20});
    document.getElementById('totalInfo').textContent=`共 ${data.totalElements} 条`;
    document.getElementById('tbody').innerHTML=data.content.map(p=>`
    <tr><td class="fw-semibold">${escHtml(p.title)}</td><td><span class="badge bg-light text-dark">${escHtml(p.category||'-')}</span></td>
      <td class="small text-muted">${escHtml((p.keyRules||'').split('\n')[0])}</td>
      <td>${diffBadge(p.difficulty)}</td>
      <td><button class="btn btn-sm btn-outline-primary me-1" onclick='edit(${JSON.stringify(p)})'><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm ${(p.linkCount||0)>0?'btn-outline-info':'btn-outline-secondary'} me-1" onclick="openBacklinks('${p.id}','${escHtml(p.title)}')" title="被引用位置"><i class="bi bi-arrow-return-left"></i>${(p.linkCount||0)>0?`<sup>${p.linkCount}</sup>`:''}</button>
        <button class="btn btn-sm btn-outline-success me-1" onclick="startStudy('GRAMMAR_POINT','${p.id}')"><i class="bi bi-play"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="remove('${p.id}')"><i class="bi bi-trash"></i></button></td></tr>`).join('');
    document.getElementById('pagination').innerHTML=Array.from({length:data.totalPages},(_,i)=>`<li class="page-item${i+1===data.page+1?' active':''}"><a class="page-link" href="#" onclick="loadPage(${i+1});return false">${i+1}</a></li>`).join('');
}

function addExRow(sen = '') {
    const container = document.getElementById('examplesContainer');
    const div = document.createElement('div');
    div.className = 'input-group mb-2 ex-row';
    div.innerHTML = `<input class="form-control form-control-sm ex-sen" placeholder="典型例句" value="${escHtml(sen)}">
      <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.ex-row').remove()"><i class="bi bi-trash"></i></button>`;
    container.appendChild(div);
}

function openAdd(){editId=null;document.getElementById('modalTitle').textContent='添加语法要点';['fTitle','fExplZh','fExplEn','fRules','fErrors','fSkills','fTopics'].forEach(id=>document.getElementById(id).value='');document.getElementById('examplesContainer').innerHTML='';document.getElementById('fCatEdit').value='';document.getElementById('fDiffEdit').value='1';editModal.show();}
function openImport(){importModal.show();}
function edit(p){editId=p.id;document.getElementById('modalTitle').textContent='编辑语法要点';document.getElementById('fTitle').value=p.title||'';document.getElementById('fCatEdit').value=p.category||'';document.getElementById('fExplZh').value=p.explanationZh||'';document.getElementById('fExplEn').value=p.explanationEn||'';document.getElementById('fRules').value=p.keyRules||'';document.getElementById('examplesContainer').innerHTML='';(p.examples||[]).forEach(e=>addExRow(e.sentence||''));document.getElementById('fErrors').value=p.commonErrors||'';document.getElementById('fDiffEdit').value=p.difficulty||1;document.getElementById('fSkills').value=p.skillTags||'';document.getElementById('fTopics').value=p.topicTags||'';editModal.show();}
async function save(){const body={title:document.getElementById('fTitle').value.trim(),category:document.getElementById('fCatEdit').value||null,explanationZh:document.getElementById('fExplZh').value.trim()||null,explanationEn:document.getElementById('fExplEn').value.trim()||null,keyRules:document.getElementById('fRules').value.trim()||null,examples:Array.from(document.querySelectorAll('.ex-row')).map((row,i)=>({sentence:row.querySelector('.ex-sen').value.trim()||null,sortOrder:i})).filter(e=>e.sentence),commonErrors:document.getElementById('fErrors').value.trim()||null,difficulty:parseInt(document.getElementById('fDiffEdit').value),skillTags:document.getElementById('fSkills').value.trim()||null,topicTags:document.getElementById('fTopics').value.trim()||null};try{if(editId)await Api.update(TYPE,editId,body);else await Api.create(TYPE,body);editModal.hide();showToast(editId?'更新成功':'添加成功');loadPage(currentPage);}catch(e){showToast(e.message,'danger');}}
async function remove(id){if(!confirm('确认删除？'))return;try{await Api.remove(TYPE,id);showToast('删除成功');loadPage(currentPage);}catch(e){showToast(e.message,'danger');}}
async function startStudy(type,id){try{await Api.study.start(type,id);showToast('已加入学习计划');}catch(e){showToast(e.message,'danger');}}
function openBacklinks(id, label) { BacklinksPanel.open(TYPE, id, label); }
async function doImport(){try{const arr=JSON.parse(document.getElementById('importJson').value.trim());const res=await Api.batchImport(TYPE,arr);importModal.hide();showToast(`成功导入 ${res.imported} 条`);loadPage(1);}catch(e){showToast('导入失败: '+e.message,'danger');}}

attachTopicTagDatalist(['fTopics', 'fTopic']);
loadPage(1).catch(e=>showToast('加载失败','danger'));
</script>
</body>
</html>
